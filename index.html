<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>マナビバ入退室</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      overflow: hidden; background: #000; position: fixed;
      overscroll-behavior-y: contain;
    }
    #reader { width: 100vw !important; height: 100vh !important; border: none !important; }
    #reader video { object-fit: cover; }
    .controls { position: absolute; top: 10px; left: 10px; z-index: 100; opacity: 0.5; }
    #camera-selection { padding: 5px; font-size: 12px; }
    #result {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 85%; max-width: 450px; padding: 40px 20px; text-align: center;
      font-size: 1.8em; font-weight: bold; border-radius: 20px; z-index: 1000;
      display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6); line-height: 1.4;
    }
    .loading { background: rgba(255, 255, 255, 0.9); color: #333; display: block !important; }
    .success { display: block !important; color: #fff; }
    .in-style { background: rgba(26, 115, 232, 0.95); }
    .out-style { background: rgba(230, 124, 115, 0.95); }
  </style>
</head>

<body onclick="document.documentElement.requestFullscreen();">

  <audio id="beep-sound" preload="auto">
    <source src="https://otologic.jp/free/se/wav/beeps/beep01.mp3" type="audio/mp3">
  </audio>

  <div class="controls">
    <select id="camera-selection">
      <option value="">カメラ準備中...</option>
    </select>
  </div>

  <div id="reader"></div>
  <div id="result" class="loading">カメラ準備中...<br><small>画面を一度タップしてください</small></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxs2i-UDDR_ddUW902Z-oHHS_X133LjccSXEDzLNN143Vxi3aunK2g60VbPwNb0SzWu/exec";
    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-selection');
    const resultDiv = document.getElementById('result');
    const beep = document.getElementById('beep-sound'); // 音の要素
    
    const config = { fps: 20, qrbox: (width, height) => {
      const size = Math.min(width, height) * 0.7;
      return { width: size, height: size };
    }};

    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length > 0) {
        cameraSelect.innerHTML = "";
        cameras.forEach((camera, index) => {
          const option = document.createElement("option");
          option.value = camera.id;
          option.text = camera.label || `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });
        const back = cameras.find(c => c.label.toLowerCase().includes('back'));
        cameraSelect.value = back ? back.id : cameras[cameras.length - 1].id;
        startScanning(cameraSelect.value);
      }
    });

    function startScanning(cameraId) {
      resultDiv.innerText = "QRコードをかざしてください";
      resultDiv.className = "loading";
      
      html5QrCode.start(cameraId, config, (decodedText) => {
        html5QrCode.pause();
        resultDiv.innerText = "送信中...";
        resultDiv.className = "loading";

        const formData = new URLSearchParams();
        formData.append('id', decodedText);

        fetch(GAS_URL, { method: "POST", mode: "cors", body: formData })
        .then(response => response.text())
        .then(data => {
          // ★ここで音を鳴らす
          beep.play().catch(e => console.log("音の再生に失敗:", e));

          const [name, status] = data.split(",");
          
          if (status === "IN") {
            resultDiv.innerHTML = `${name} さん<br>🔔 入室しました`;
            resultDiv.className = "success in-style";
          } else {
            resultDiv.innerHTML = `${name} さん<br>🏠 退室しました`;
            resultDiv.className = "success out-style";
          }
          
          setTimeout(() => {
            resultDiv.innerText = "QRコードをかざしてください";
            resultDiv.className = "loading";
            html5QrCode.resume();
          }, 2000);
        })
        .catch(err => {
          resultDiv.innerText = "通信エラー: もう一度かざしてください";
          setTimeout(() => html5QrCode.resume(), 2000);
        });
      });
    }
  </script>
</body>
</html>
