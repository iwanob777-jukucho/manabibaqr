<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マナビバ入退室</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f2f5; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; overflow: hidden; background: white; }
    #result { margin-top: 20px; font-size: 1.2em; font-weight: bold; padding: 15px; border-radius: 8px; }
    .loading { color: #666; }
    .success { background: #d4edda; color: #155724; }
  </style>
</head>
<body>
  <h2>マナビバ入退室管理</h2>
  <div id="reader"></div>
  <div id="result" class="loading">カメラを起動中...</div>

  <script>
    // ★ここをご自身のGASのURLに書き換えてください（""は残す）
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxs2i-UDDR_ddUW902Z-oHHS_X133LjccSXEDzLNN143Vxi3aunK2g60VbPwNb0SzWu/exec";

    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
      html5QrCode.pause();
      const resultDiv = document.getElementById('result');
      resultDiv.innerText = "送信中...";

      fetch(GAS_URL, {
        method: "POST",
        mode: "cors", // 返り値を受け取るためcorsにします
        body: formData
      })
      .then(response => response.text())
      .then(data => {
        // dataには「生徒名,IN」のような文字が入っています
        const resultParts = data.split(",");
        const name = resultParts[0];
        const status = resultParts[1];

        if (status === "IN") {
          resultDiv.innerHTML = `<span style="font-size: 1.2em; color: #1a73e8;">${name} さん</span><br>🔔 入室しました！`;
          resultDiv.style.backgroundColor = "#e3f2fd";
        } else if (status === "OUT") {
          resultDiv.innerHTML = `<span style="font-size: 1.2em; color: #e67c73;">${name} さん</span><br>🏠 退室しました！`;
          resultDiv.style.backgroundColor = "#fff3e0";
        } else {
          resultDiv.innerText = "記録完了";
        }

        resultDiv.className = "success";
        
        setTimeout(() => {
          resultDiv.innerText = "QRコードをかざしてください";
          resultDiv.className = "loading";
          resultDiv.style.backgroundColor = "";
          html5QrCode.resume();
        }, 4000); // 名前を確認できるよう少し長め（4秒）に表示
      });
  </script>
</body>
</html>
