<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>マナビバ入退室</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* 全画面設定とスクロール禁止 */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #000;
      position: fixed;
      overscroll-behavior-y: contain; /* 引っ張りリロード防止 */
    }

    /* カメラを画面いっぱいに広げる */
    #reader { 
      width: 100vw !important; 
      height: 100vh !important; 
      border: none !important;
    }
    
    #reader video {
      object-fit: cover;
    }

    /* カメラ切り替え（左上に配置） */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 100;
      opacity: 0.5;
    }
    #camera-selection { padding: 5px; font-size: 12px; }

    /* 結果表示の帯（中央に最前面表示） */
    #result {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 450px;
      padding: 40px 20px;
      text-align: center;
      font-size: 1.8em;
      font-weight: bold;
      border-radius: 20px;
      z-index: 1000;
      display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      line-height: 1.4;
    }

    .loading { background: rgba(255, 255, 255, 0.9); color: #333; display: block !important; }
    .success { display: block !important; color: #fff; }
    .in-style { background: rgba(26, 115, 232, 0.95); } /* 入室：青 */
    .out-style { background: rgba(230, 124, 115, 0.95); } /* 退室：赤 */
  </style>
</head>

<body onclick="document.documentElement.requestFullscreen();">

  <div class="controls">
    <select id="camera-selection">
      <option value="">カメラ準備中...</option>
    </select>
  </div>

  <div id="reader"></div>
  <div id="result" class="loading">カメラ準備中...<br><small>画面を一度タップしてください</small></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxs2i-UDDR_ddUW902Z-oHHS_X133LjccSXEDzLNN143Vxi3aunK2g60VbPwNb0SzWu/exec";
    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-selection');
    const resultDiv = document.getElementById('result');
    
    // QR読み取り範囲の調整
    const config = { fps: 20, qrbox: (width, height) => {
      const size = Math.min(width, height) * 0.7;
      return { width: size, height: size };
    }};

    // カメラのリストアップ
    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length > 0) {
        cameraSelect.innerHTML = "";
        cameras.forEach((camera, index) => {
          const option = document.createElement("option");
          option.value = camera.id;
          option.text = camera.label || `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });
        // 背面カメラっぽいのを優先、なければ最後を選択
        const back = cameras.find(c => c.label.toLowerCase().includes('back'));
        cameraSelect.value = back ? back.id : cameras[cameras.length - 1].id;
        startScanning(cameraSelect.value);
      }
    }).catch(err => {
      resultDiv.innerText = "カメラエラー: 権限を確認してください";
    });

    cameraSelect.addEventListener('change', () => {
      html5QrCode.stop().then(() => startScanning(cameraSelect.value));
    });

    function startScanning(cameraId) {
      resultDiv.innerText = "QRコードをかざしてください";
      resultDiv.className = "loading";
      
      html5QrCode.start(cameraId, config, (decodedText) => {
        html5QrCode.pause();
        resultDiv.innerText = "送信中...";
        resultDiv.className = "loading";

        const formData = new URLSearchParams();
        formData.append('id', decodedText);

        fetch(GAS_URL, { method: "POST", mode: "cors", body: formData })
        .then(response => response.text())
        .then(data => {
          const [name, status] = data.split(",");
          
          if (status === "IN") {
            resultDiv.innerHTML = `${name} さん<br>🔔 入室しました`;
            resultDiv.className = "success in-style";
          } else {
            resultDiv.innerHTML = `${name} さん<br>🏠 退室しました`;
            resultDiv.className = "success out-style";
          }
          
          // 表示時間は2秒
          setTimeout(() => {
            resultDiv.innerText = "QRコードをかざしてください";
            resultDiv.className = "loading";
            html5QrCode.resume();
          }, 2000);
        })
        .catch(err => {
          resultDiv.innerText = "通信エラー: もう一度かざしてください";
          setTimeout(() => html5QrCode.resume(), 2000);
        });
      });
    }
  </script>
</body>
</html>
