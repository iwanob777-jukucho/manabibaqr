<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>マナビバ入退室</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* 全画面設定とスクロール禁止 */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; /* スクロール禁止 */
      background: #000;
      position: fixed; /* iOSなどの引っ張りスクロール防止 */
    }

    /* カメラを画面いっぱいに広げる */
    #reader { 
      width: 100vw !important; 
      height: 100vh !important; 
      border: none !important;
    }
    
    /* html5-qrcode内部のビデオ要素を全画面にフィットさせる */
    #reader video {
      object-fit: cover;
    }

    /* カメラ切り替え用セレクトボックス（左上に浮かせる） */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 100;
      opacity: 0.7;
    }
    #camera-selection { padding: 8px; border-radius: 5px; }

    /* 結果表示の帯（最前面に中央表示） */
    #result {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* 画面中央に配置 */
      width: 80%;
      max-width: 400px;
      padding: 30px 20px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      border-radius: 15px;
      z-index: 1000;
      display: none; /* 最初は隠しておく */
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .loading { background: rgba(255, 255, 255, 0.9); color: #333; display: block !important; }
    .success { display: block !important; color: #fff; }
    .in-style { background: rgba(26, 115, 232, 0.95); } /* 入室：青 */
    .out-style { background: rgba(230, 124, 115, 0.95); } /* 退室：赤 */
  </style>
</head>
<body>

  <div class="controls">
    <select id="camera-selection">
      <option value="">カメラを探しています...</option>
    </select>
  </div>

  <div id="reader"></div>
  <div id="result" class="loading">カメラ準備中...</div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxs2i-UDDR_ddUW902Z-oHHS_X133LjccSXEDzLNN143Vxi3aunK2g60VbPwNb0SzWu/exec";
    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-selection');
    const resultDiv = document.getElementById('result');
    
    // カメラ設定（全画面でも読みやすくfpsを調整）
    const config = { fps: 20, qrbox: (width, height) => {
      return { width: width * 0.7, height: width * 0.7 }; // 画面の7割を読み取り範囲に
    }};

    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length > 0) {
        cameraSelect.innerHTML = "";
        cameras.forEach((camera, index) => {
          const option = document.createElement("option");
          option.value = camera.id;
          option.text = camera.label || `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });
        cameraSelect.value = cameras[cameras.length - 1].id;
        startScanning(cameraSelect.value);
      }
    });

    cameraSelect.addEventListener('change', () => {
      html5QrCode.stop().then(() => startScanning(cameraSelect.value));
    });

    function startScanning(cameraId) {
      resultDiv.innerText = "QRコードをかざしてください";
      resultDiv.className = "loading";
      
      html5QrCode.start(cameraId, config, (decodedText) => {
        html5QrCode.pause();
        resultDiv.innerText = "送信中...";
        resultDiv.className = "loading";

        const formData = new URLSearchParams();
        formData.append('id', decodedText);

        fetch(GAS_URL, { method: "POST", mode: "cors", body: formData })
        .then(response => response.text())
        .then(data => {
          const [name, status] = data.split(",");
          
          if (status === "IN") {
            resultDiv.innerHTML = `${name} さん<br>🔔 入室しました`;
            resultDiv.className = "success in-style";
          } else {
            resultDiv.innerHTML = `${name} さん<br>🏠 退室しました`;
            resultDiv.className = "success out-style";
          }
          
          setTimeout(() => {
            resultDiv.innerText = "QRコードをかざしてください";
            resultDiv.className = "loading";
            html5QrCode.resume();
          }, 2000);
        })
        .catch(err => {
          resultDiv.innerText = "エラー: 再試行してください";
          setTimeout(() => html5QrCode.resume(), 2000);
        });
      });
    }
  </script>
</body>
</html>
